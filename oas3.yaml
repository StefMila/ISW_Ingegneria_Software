      required:
        - matricola
        - name
        - species
        - dataNascita
        - sesso
      properties:
        matricola:
          type: string
          description: Identificativo univoco dell'animale
          minLength: 1
          example: ITA00123
        name:
          type: string
          description: Nome dell'animale
          minLength: 1
          example: Stella
        species:
          type: string
          description: Specie dell'animale
          enum:
            - mucca
            - pecora
            - capra
            - pollo
            - coniglio
          example: mucca
        dataNascita:
          type: string
          format: date
          description: Data di nascita dell'animale
          example: 2022-03-10
        sesso:
          type: string
          description: Sesso dell'animale
          enum:
            - maschio
            - femmina
          example: femmina
        figliaDi:
          type: string
          description: Matricola della madre (se disponibile)
          example: ITA00099
        razza:
          type: string
          description: Razza dell'animale
          example: frisona
        note:
          type: string
          description: Note aggiuntive sull'animale
          example: primo parto regolare

    AnimaleResponse:
      type: object
      description: Risposta di creazione animale
      properties:
        message:
          type: string
          description: Messaggio di conferma
          example: Animale registrato con successo
        animale:
          type: object
          properties:
            _id:
              type: string
              example: 665f9f10ad8f8c0012f9d111
            matricola:
              type: string
              example: ITA00123
            name:
              type: string
              example: Stella
            species:
              type: string
              example: mucca
            dataNascita:
              type: string
              format: date-time
              example: 2022-03-10T00:00:00.000Z
            sesso:
              type: string
              example: femmina
            razza:
              type: string
              example: frisona
            figliaDi:
              type: string
              example: ITA00099
            aziendaId:
              type: string
              example: 665f8fd8ad8f8c0012f9c123
            note:
              type: string
              example: primo parto regolare

    AnimaleListItem:
      type: object
      description: Singolo animale restituito nella view della mandria
      properties:
        _id:
          type: string
          example: 665f9f10ad8f8c0012f9d111
        matricola:
          type: string
