  /api/azienda/{id}:
    delete:
      summary: Elimina un'azienda
      description: Elimina l'azienda identificata dall'id specificato.
      tags:
        - Azienda
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID dell'azienda da eliminare
          schema:
            type: string
      responses:
        '200':
          description: Azienda eliminata con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                success:
                  value:
                    message: Azienda eliminata con successo
        '400':
          description: ID azienda non valido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidId:
                  value:
                    message: ID azienda non valido
        '401':
          description: Token mancante, non valido o scaduto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingOrInvalidToken:
                  value:
                    message: "Token mancante o formato non valido: Accesso negato"
        '403':
          description: Permessi insufficienti (solo allevatore)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbiddenRole:
                  value:
                    message: "Permessi insufficienti: Accesso negato"
        '404':
          description: Azienda non trovata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    message: Azienda non trovata

        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              

  /api/azienda/{aziendaId}/animali:
    post:
      summary: Registra un nuovo animale per un'azienda
      description: Endpoint consigliato. Permette a un allevatore autenticato di registrare un animale nell'azienda indicata nel path.
      tags:
        - Animale
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: aziendaId
          required: true
          description: ID dell'azienda a cui associare l'animale
          schema:
            type: string
      requestBody:
        required: true
        description: Dati necessari per la registrazione dell'animale.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnimaleInAziendaRequest'
            examples:
              Mucca Stella:
                value:
                  matricola: ITA00123
                  name: Stella
                  species: mucca
                  dataNascita: 2022-03-10
                  sesso: femmina
                  razza: frisona
                  figliaDi: ITA00099
                  note: primo parto regolare

              Mucca Luna:
                value:
                  matricola: ITA00124
                  name: Luna
                  species: mucca
                  dataNascita: 2023-06-15
                  sesso: femmina
                  razza: frisona
                  figliaDi: ITA00099
                  note: prima gravidanza, monitorare attentamente
      responses:
        '201':
          description: Animale registrato con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnimaleResponse'
              examples:
                success:
                  value:
                    message: "Animale registrato con successo"
                    animale:
                      _id: "665f8fd8ad8f8c0012f9c456"
                      matricola: "ITA00123"
                      name: "Stella"
                      species: "mucca"
                      dataNascita: "2022-03-10T00:00:00.000Z"
                      sesso: "femmina"
                      razza: "frisona"
                      figliaDi: "ITA00099"
                      aziendaId: "665f8fd8ad8f8c0012f9c123"
                      note: "primo parto regolare"
        '400':
          description: Dati non validi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  value:
                    message: "Matricola, name, species, dataNascita, sesso e aziendaId sono obbligatori"
                invalidData:
                  value:
                    message: "Dati animale non validi"
        '401':
          description: Token mancante, non valido o scaduto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingOrInvalidToken:
                  value:
                    message: "Token mancante o formato non valido: Accesso negato"
        '403':
          description: Permessi insufficienti o azienda non di proprietà dell'utente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbiddenRole:
                  value:
                    message: "Permessi insufficienti: Accesso negato"
                forbiddenOwnership:
                  value:
                    message: "Non hai i permessi per questa azienda"
        '404':
          description: Azienda non trovata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    message: Azienda non trovata
        '409':
          description: Animale già esistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateMatricola:
                  value:
                    message: "Esiste già un animale con questa matricola"
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Visualizza gli animali di un'azienda
      description: Endpoint consigliato. Restituisce l'elenco paginato degli animali dell'azienda selezionata con supporto a filtri per colonna e ordinamento.
      tags:
        - Animale
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: aziendaId
          required: true
          description: ID dell'azienda di cui visualizzare la mandria
          schema:
            type: string
        - in: query
          name: matricola
          required: false
          description: Filtro testuale per matricola (contains, case-insensitive)
          schema:
            type: string
        - in: query
          name: name
          required: false
          description: Filtro testuale per nome animale (contains, case-insensitive)
          schema:
            type: string
        - in: query
          name: species
          required: false
          description: Filtro esatto per specie
          schema:
            type: string
            enum:
              - mucca
              - pecora
              - capra
              - pollo
              - coniglio
        - in: query
          name: sesso
          required: false
          description: Filtro esatto per sesso
          schema:
            type: string
            enum:
              - maschio
              - femmina
        - in: query
          name: razza
          required: false
          description: Filtro testuale per razza (contains, case-insensitive)
          schema:
            type: string
        - in: query
          name: figliaDi
          required: false
          description: Filtro testuale per matricola madre (contains, case-insensitive)
          schema:
            type: string
        - in: query
          name: note
          required: false
          description: Filtro testuale per note (contains, case-insensitive)
          schema:
            type: string
        - in: query
          name: dataNascitaDa
          required: false
          description: Limite inferiore data di nascita (inclusivo)
          schema:
            type: string
            format: date
        - in: query
          name: dataNascitaA
          required: false
          description: Limite superiore data di nascita (inclusivo)
          schema:
            type: string
            format: date
        - in: query
          name: sortBy
          required: false
          description: Campo di ordinamento
          schema:
            type: string
            enum:
              - matricola
              - name
              - species
              - dataNascita
              - sesso
              - razza
              - createdAt
            default: createdAt
        - in: query
          name: sortOrder
          required: false
          description: Direzione ordinamento
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
        - in: query
          name: page
          required: false
          description: Numero pagina (minimo 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          description: Numero massimo elementi per pagina (minimo 1)
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        '200':
          description: Elenco animali recuperato con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnimaliListResponse'
              examples:
                success:
                  value:
                    items:
                      - _id: 665f9f10ad8f8c0012f9d111
                        matricola: IT001BG001
                        name: Margherita
                        species: mucca
                        dataNascita: 2019-03-12T00:00:00.000Z
                        sesso: femmina
                        razza: Frisona
                        figliaDi: null
                        aziendaId: 665f8fd8ad8f8c0012f9c123
                        note: Alta produzione di latte
                    pagination:
                      page: 1
                      limit: 10
                      totalItems: 20
                      totalPages: 2
        '400':
          description: aziendaId non valido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidAziendaId:
                  value:
                    message: "aziendaId non è un ObjectId valido"
        '401':
          description: Token mancante, non valido o scaduto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingOrInvalidToken:
                  value:
                    message: "Token mancante o formato non valido: Accesso negato"
        '403':
          description: Permessi insufficienti (solo allevatore o azienda non di proprietà)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbiddenRole:
                  value:
                    message: "Permessi insufficienti: Accesso negato"
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
                forbiddenOwnership:
                  value:
                    message: "Non hai i permessi per questa azienda"
        '404':
          description: Azienda non trovata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    message: Azienda non trovata

  /api/animali/register:
    post:
      summary: Registra un nuovo animale per un'azienda
      description: Endpoint legacy. Permette a un allevatore autenticato di registrare un animale passando l'azienda nel body della richiesta.
      deprecated: true
      tags:
        - Animale
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: Dati necessari per la registrazione dell'animale.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnimaleRequest'
      responses:
        '201':
          description: Animale registrato con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnimaleResponse'
        '400':
          description: Dati non validi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token mancante, non valido o scaduto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permessi insufficienti o azienda non di proprietà dell'utente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Azienda non trovata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Animale già esistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/animali/azienda/{aziendaId}:
    get:
      summary: Visualizza gli animali di un'azienda
      description: Endpoint legacy. Restituisce l'elenco paginato degli animali dell'azienda selezionata con supporto a filtri per colonna e ordinamento.
      deprecated: true
      tags:
        - Animale
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: aziendaId
          required: true
          description: ID dell'azienda di cui visualizzare la mandria
          schema:
            type: string
        - in: query
          name: matricola
          required: false
          description: Filtro testuale per matricola (contains, case-insensitive)
          schema:
            type: string
        - in: query
          name: name
          required: false
          description: Filtro testuale per nome animale (contains, case-insensitive)
          schema:
            type: string
        - in: query
          name: species
          required: false
          description: Filtro esatto per specie
          schema:
            type: string
            enum:
              - mucca
              - pecora
              - capra
              - pollo
              - coniglio
        - in: query
          name: sesso
          required: false
          description: Filtro esatto per sesso
          schema:
            type: string
            enum:
              - maschio
              - femmina
        - in: query
          name: razza
          required: false
          description: Filtro testuale per razza (contains, case-insensitive)
          schema:
            type: string
        - in: query
          name: figliaDi
          required: false
          description: Filtro testuale per matricola madre (contains, case-insensitive)
          schema:
            type: string
        - in: query
          name: note
          required: false
          description: Filtro testuale per note (contains, case-insensitive)
          schema:
            type: string
        - in: query
          name: dataNascitaDa
          required: false
          description: Limite inferiore data di nascita (inclusivo)
          schema:
            type: string
            format: date
        - in: query
          name: dataNascitaA
          required: false
          description: Limite superiore data di nascita (inclusivo)
          schema:
            type: string
            format: date
        - in: query
          name: sortBy
          required: false
          description: Campo di ordinamento
          schema:
            type: string
            enum:
              - matricola
              - name
              - species
              - dataNascita
              - sesso
              - razza
              - createdAt
            default: createdAt
        - in: query
          name: sortOrder
          required: false
          description: Direzione ordinamento
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
        - in: query
          name: page
          required: false
          description: Numero pagina (minimo 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          description: Numero massimo elementi per pagina (minimo 1)
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        '200':
          description: Elenco animali recuperato con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnimaliListResponse'
        '400':
          description: aziendaId non valido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidAziendaId:
                  value:
                    message: "aziendaId non è un ObjectId valido"
        '401':
          description: Token mancante, non valido o scaduto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permessi insufficienti (solo allevatore o azienda non di proprietà)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbiddenOwnership:
                  value:
                    message: "Non hai i permessi per questa azienda"
        '404':
          description: Azienda non trovata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  
  /api/azienda/{aziendaId}/animali/{id}:
    delete:
      summary: Elimina un animale
      description: Elimina l'animale identificato dall'id specificato.
      tags:
        - Animale
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID dell'animale da eliminare
          schema:
            type: string
      responses:
        '200':
          description: Animale eliminato con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                success:
                  value:
                    message: Animale eliminato con successo
        '400':
          description: ID animale non valido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidId:
                  value:
                    message: ID animale non valido
        '401':
          description: Token mancante, non valido o scaduto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingOrInvalidToken:
                  value:
                    message: "Token mancante o formato non valido: Accesso negato"
        '403':
          description: Permessi insufficienti (solo allevatore)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbiddenRole:
                  value:
                    message: "Permessi insufficienti: Accesso negato"
        '404':
          description: Animale non trovato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    message: Animale non trovato

        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      description: Risposta di stato del server
      properties:
        message:
          type: string
          description: Messaggio descrittivo dello stato del server
          example: Server attivo
        status:
          type: string
          description: Stato sintetico del server
          example: ok

    SignupRequest:
      type: object
      description: Corpo della richiesta per la registrazione di un utente
      required:
        - name
        - surname
        - email
        - password
        - userType
      properties:
        name:
          type: string
          description: Nome dell'utente
          minLength: 1
          example: Mario
        surname:
          type: string
          description: Cognome dell'utente
          minLength: 1
          example: Rossi
        email:
          type: string
          format: email
          description: Indirizzo email univoco dell'utente
          example: mario.rossi@example.com
        password:
          type: string
          format: password
          description: Password in chiaro inviata dal client; verrà hashata dal server prima del salvataggio
          minLength: 8
          example: Password123
        userType:
          type: string
          description: Tipologia dell'utente registrato
          enum:
            - allevatore
            - distributore
            - veterinario
            - consumatore
          example: consumatore

    MessageResponse:
      type: object
      description: Risposta generica di successo
      properties:
        message:
          type: string
          description: Messaggio di conferma dell'operazione
          example: Utente registrato con successo

    ErrorResponse:
      type: object
      description: Risposta generica di errore
      properties:
        message:
          type: string
          description: Messaggio che descrive l'errore
          example: Errore interno del server

    LoginRequest:
      type: object
      description: Corpo della richiesta per l'autenticazione di un utente
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: Email dell'utente registrato
          example: mario.rossi@example.com
        password:
          type: string
          format: password
          description: Password dell'utente registrato
          example: Password123

    LoginResponse:
      type: object
      description: Risposta alla richiesta di login
      properties:
        message:
          type: string
          description: Messaggio di conferma dell'autenticazione
          example: Login effettuato con successo
        token:
          type: string
          description: JWT restituito dal server per autenticare le richieste successive.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
        email:
          type: string
          format: email
          description: Email dell'utente autenticato
          example: mario.rossi@example.com
        id:
          type: string
          description: Identificativo dell'utente autenticato
          example: 665f8d90ad8f8c0012f9b456
        userType:
          type: string
          description: Ruolo dell'utente autenticato.
          enum:
            - allevatore
            - distributore
            - veterinario
            - consumatore
          example: allevatore

    ForgotPasswordResponse:
      type: object
      description: Risposta alla richiesta di cambio password.
      properties:
        message:
          type: string
          description: Messaggio di conferma della ricezione della richiesta di cambio password.
          example: Email inserita correttamente, riceverai istruzioni per reimpostare la password.
        token:
          type: string
          description: Token per la reimpostazione della password di breve durata (10 minuti).
          example: hjkfgyfdtserfg6r5r6uhgvcfdr56y

    CreateAziendaRequest:
      type: object
      description: Corpo della richiesta per la creazione di una nuova azienda
      required:
        - companyName
        - address
        - vatNumber
        - emailAzienda
      properties:
        companyName:
          type: string
          description: Nome dell'azienda
          minLength: 1
          example: Azienda Agricola Rossi
        address:
          type: string
          description: Indirizzo della sede aziendale
          minLength: 1
          example: Via Roma 10, Milano
        vatNumber:
          type: string
          description: Partita IVA dell'azienda
          minLength: 1
          maxLength: 13
          example: IT12345678901
          pattern: ^IT\d{11}$  # Validazione della partita IVA italiana
        emailAzienda:
          type: string
          format: email
          description: Email di contatto dell'azienda
          example: info@azienda-rossi.it
        phoneNumber:
          type: string
          description: Numero di telefono dell'azienda
          example: "+39021234567"
        website:
          type: string
          description: Sito web aziendale
          example: https://www.azienda-rossi.it

    AziendaResponse:
      type: object
      description: Risposta di creazione azienda
      properties:
        message: 
          type: string
          description: Messaggio di conferma
          example: Azienda registrata con successo
        company:
          type: object
          properties:
            id:
              type: string
              description: Identificativo azienda
              example: 665f8fd8ad8f8c0012f9c123
            ownerUserId:
              type: string
              description: ID dell'allevatore proprietario, valorizzato automaticamente dal token JWT
              example: 665f8d90ad8f8c0012f9b456
            vatNumber:
              type: string
              example: IT12345678901
            companyName:
              type: string
              example: Azienda Agricola Rossi
            emailAzienda:
              type: string
              format: email
              example: info@azienda-rossi.it
            address:
              type: string
              example: Via Roma 10, Milano
            phoneNumber:
              type: string
              example: "+39021234567"
            website:
              type: string
              example: https://www.azienda-rossi.it

    AziendaSummary:
      type: object
      description: Riepilogo sintetico di un'azienda appartenente a un allevatore
      additionalProperties: false
      properties:
        _id:
          type: string
          example: 665f8fd8ad8f8c0012f9c123
        companyName:
          type: string
          example: Azienda Agricola Rossi
        vatNumber:
          type: string
          example: IT12345678901
        address:
          type: string
          example: Via Roma 10, Milano
        emailAzienda:
          type: string
          format: email
          example: info@azienda-rossi.it
          
    CreateAnimaleRequest:
      type: object
      description: Corpo della richiesta per la registrazione di un nuovo animale
      required:
        - matricola
        - name
        - species
        - dataNascita
        - sesso
        - aziendaId
      properties:
        matricola:
          type: string
          description: Identificativo univoco dell'animale
          minLength: 1
          example: ITA00123
        name:
          type: string
          description: Nome dell'animale
          minLength: 1
          example: Stella
        species:
          type: string
          description: Specie dell'animale
          enum:
            - mucca
            - pecora
            - capra
            - pollo
            - coniglio
          example: mucca
        dataNascita:
          type: string
          format: date
          description: Data di nascita dell'animale
          example: 2022-03-10
        sesso:
          type: string
          description: Sesso dell'animale
          enum:
            - maschio
            - femmina
          example: femmina
        figliaDi:
          type: string
          description: Matricola della madre (se disponibile)
          example: ITA00099
        aziendaId:
          type: string
          description: ID dell'azienda proprietaria dell'animale
          example: 665f8fd8ad8f8c0012f9c123
        note:
          type: string
          description: Note aggiuntive sull'animale
          example: primo parto regolare

    CreateAnimaleInAziendaRequest:
      type: object
