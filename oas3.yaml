openapi: 3.0.3
info:
  title: MuccApp API
  description: Documentazione API del backend MuccApp
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Development server

tags:
  - name: Health
    description: Endpoint per verificare lo stato del server
  - name: Auth
    description: Endpoint per la registrazione e autenticazione degli utenti
  - name: Azienda
    description: Endpoint per la registrazione e gestione aziende
  - name: Animale
    description: Endpoint per la registrazione e gestione animali

paths:
  /api/health:
    get:
      summary: Verifica che il server sia attivo
      description: Restituisce lo stato del server per verificare che il backend sia raggiungibile e funzionante
      tags:
        - Health
      responses:
        '200':
          description: Server attivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                success:
                  value:
                    message: Server attivo
                    status: ok

  /api/auth/signup:
    post:
      summary: Registra un nuovo utente
      description: Crea un nuovo account utente nel sistema. L'email deve essere univoca e la password viene salvata in forma hashata.
      tags:
        - Auth
      requestBody:
        required: true
        description: Dati necessari per la registrazione di un nuovo utente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
            examples:
              consumatore:
                value:
                  name: Mario
                  surname: Rossi
                  email: mario.rossi@example.com
                  password: Password123
                  userType: consumatore
              allevatore:
                value:
                  name: Marisa
                  surname: Rossi
                  email: marisa.rossi@example.com
                  password: Password123
                  userType: allevatore
              distributore:
                value:
                  name: Luca
                  surname: Verdi
                  email: luca.verdi@example.com
                  password: Password123
                  userType: distributore
              veterinario:
                value:
                  name: Laura
                  surname: Bianchi
                  email: laura.bianchi@example.com
                  password: Password123
                  userType: veterinario

      responses:
        '201':
          description: Utente registrato con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                success:
                  value:
                    message: Utente registrato con successo

        '400':
          description: Dati mancanti o non validi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  value:
                    message: Nome, cognome, email, password e ruolo sono obbligatori
                invalidUserType:
                  value:
                    message: ruolo non valido.
                invalidEmail:
                  value:
                    message: Email non valida.
                invalidPassword:
                  value:
                    message: La password deve essere lunga almeno 8 caratteri.

        '409':
          description: Utente già esistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateEmail:
                  value:
                    message: Utente già esistente

        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serverError:
                  value:
                    message: Errore interno del server

  /api/auth/login:
    post:
      summary: Autentica un utente
      description: Verifica le credenziali dell'utente e restituisce un token JWT per accedere all'applicazione.
      tags:
        - Auth
      requestBody:
        required: true
        description: Credenziali necessarie per il login.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              consumatore:
                value:
                  email: mario.rossi@example.com
                  password: Password123
              allevatore:
                value:
                  email: marisa.rossi@example.com
                  password: Password123
              distributore:
                value:
                  email: luca.verdi@example.com
                  password: Password123
              veterinario:
                value:
                  email: laura.bianchi@example.com
                  password: Password123
      responses:
        '200':
          description: Login effettuato con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                success:
                  value:
                    message: Login effettuato con successo
                    token: jwt-token-di-esempio
                    email: mario.rossi@example.com
                    id: 665f8d90ad8f8c0012f9b456
                    userType: allevatore
        '400':
          description: Email e password sono obbligatorie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  value:
                    message: Email e password sono obbligatorie
        '401':
          description: Credenziali non valide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidEmail:
                  value:
                    message: Email non valida
                invalidPassword:
                  value:
                    message: Password non valida
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serverError:
                  value:
                    message: Errore interno del server

  /api/auth/logout:
    post:
      summary: Disconnette un utente
      description: Effettua il logout dell'utente. In questa versione il token viene rimosso lato client; la revoca server-side sarà gestita in una fase successiva.
      tags:
        - Auth
      responses:
        '200':
          description: Logout effettuato con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                success:
                  value:
                    message: Logout effettuato con successo
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serverError:
                  value:
                    message: Errore interno del server

  /api/auth/forgot-password:
    post:
      summary: Richiesta di reset password
      description: Permette agli utenti di richiedere un reset della password fornendo la propria email. In questa versione non è implementato un sistema di invio email, ma sarà aggiunto in futuro.
      tags:
        - Auth
      requestBody:
        required: true
        description: Dati necessari per richiedere il reset della password
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  description: Email dell'utente che richiede il reset della password
                  example: mario.rossi@example.com
      responses:
        '200':
          description: Richiesta di reset password ricevuta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgotPasswordResponse'
              examples:
                success:
                  value:
                    message: Email inserita correttamente, riceverai istruzioni per reimpostare la password
                    token: hjkfgyfdtserfg6r5r6uhgvcfdr56y
        '400':
          description: Dati mancanti o non validi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  value:
                    message: Email è obbligatoria
        '404':
          description: Utente non trovato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                userNotFound:
                  value:
                    message: Utente non trovato
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serverError:
                  value:
                    message: Errore interno del server

  /api/auth/reset-password:
    post:
      summary: Reset della password
      description: Permette agli utenti di reimpostare la propria password fornendo l'email e una nuova password.
      tags:
        - Auth
      requestBody:
        required: true
        description: Dati necessari per il reset della password
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - newPassword
              properties:
                email:
                  type: string
                  format: email
                  description: Email dell'utente che richiede il reset della password
                  example: mario.rossi@example.com
                newPassword:
                  type: string
                  format: password
                  description: Nuova password dell'utente
                  example: NuovaPassword123
      responses:
        '200':
          description: Password aggiornata con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                success:
                  value:
                    message: Password aggiornata con successo
        '400':
          description: Dati mancanti o non validi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  value:
                    message: Email e newPassword sono obbligatori
                weakPassword:
                  value:
                    message: La nuova password deve essere lunga almeno 8 caratteri.
        '404':
          description: Utente non trovato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                userNotFound:
                  value:
                    message: Utente non trovato
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serverError:
                  value:
                    message: Errore interno del server

  /api/azienda:
    post:
      summary: Crea una nuova azienda
      description: Permette a un allevatore autenticato di registrare una o più aziende associate al proprio account. L'accesso è riservato al solo ruolo allevatore; gli altri userType ricevono un errore di autorizzazione.
      tags:
        - Azienda
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: Dati necessari per la creazione dell'azienda.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAziendaRequest'
            examples:
              example1:
                value:
                  companyName: Azienda Agricola Rossi
                  address: Via Roma 10, Milano
                  vatNumber: IT12345678901
                  emailAzienda: info@azienda-rossi.it
                  phoneNumber: "+39021234567"
                  website: https://www.azienda-rossi.it
      responses:
        '201':
          description: Azienda creata con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AziendaResponse'
              examples:
                success:
                  value:
                    message: "Azienda registrata con successo"
                    company:
                      id: "665f8fd8ad8f8c0012f9c123"
                      ownerUserId: "665f8d90ad8f8c0012f9b456"
                      vatNumber: "IT12345678901"
                      companyName: "Azienda Agricola Rossi"
                      emailAzienda: "info@azienda-rossi.it"
                      address: "Via Roma 10, Milano"
                      phoneNumber: "+39021234567"
                      website: "https://www.azienda-rossi.it"
        '400':
          description: Dati non validi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  value:
                    message: "Partita IVA, nome azienda, email azienda e indirizzo sono obbligatori"
                invalidEmail:
                  value:
                    message: "Email azienda non valida."
        '409':
          description: Azienda già esistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateVatNumber:
                  value:
                    message: "Esiste già un’azienda con questa partita IVA"
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serverError:
                  value:
                    message: "Errore interno del server"
  
  
