        limit:
          type: integer
          minimum: 1
          example: 10
        totalItems:
          type: integer
          minimum: 0
          example: 20
        totalPages:
          type: integer
          minimum: 0
          example: 2

    AnimaliListResponse:
      type: object
      description: Risposta della view animali con elenco e paginazione
      properties:
        items:
