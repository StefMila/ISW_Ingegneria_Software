<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Allevatore - MuccApp</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="dashboard-container">
    <header class="dashboard-header">
      <div class="nav-buttons">
        <div class="nav-dropdown">
          <button class="nav-dropdown-toggle">La tua azienda ▾</button>
          <ul class="nav-dropdown-menu">
            <li><a href="/add-azienda.html">Aggiungi azienda</a></li>
            <li><a href="/view-azienda.html">Elimina azienda</a></li>
            <!-- 
            //per le prossime user story, se implementiamo la visualizzazione e modifica dell'azienda
            <li><a href="#section-azienda">Visualizza azienda</a></li>
            <li><a href="/edit-azienda.html">Modifica azienda</a></li>
             -->
          </ul>
        </div>
        <div class="nav-dropdown">
          <button class="nav-dropdown-toggle">La tua mandria ▾</button>
          <ul class="nav-dropdown-menu"> 
            <li><a href="/add-animale.html">Aggiungi animale</a></li>
            <!-- 
            //per le prossime user story, se implementiamo la visualizzazione e modifica dell'azienda
            <li><a href="/view-animali.html">Visualizza animali</a></li>
            <li><a href="#section-azienda">Visualizza azienda</a></li>
            <li><a href="/edit-azienda.html">Modifica azienda</a></li>
             -->
          </ul>
        </div>
        <button onclick="document.getElementById('section-documenti')?.scrollIntoView({behavior:'smooth'})">I tuoi documenti</button>
      </div>

      <div class="header-right-actions">
        <button id="currentAziendaBadge" class="dashboard-header-pill dashboard-header-pill-button" type="button">Azienda attiva: non selezionata</button>
        <button id="logoutButton">Logout</button>
      </div>
    </header>

    <section id="section-azienda-attiva" class="section">
      <h2>Azienda Attiva</h2>
      <p id="aziendaSelectionStatus" class="status"></p>
      <div id="aziendaSelectionControls" hidden>
        <label for="aziendaSelector">Seleziona l'azienda</label>
        <select id="aziendaSelector"></select>
        <button id="saveAziendaSelectionButton" type="button">Seleziona azienda</button>
      </div>
    </section>

  </main>

  <script src="/home-allevatore.js"></script>
  <script src="/logout.js"></script>
</body>
</html>
