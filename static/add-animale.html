<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title >Aggiungi Animale - MuccApp</title>
  <!-- Controllo accesso alla pagina, solo gli utenti con ruolo "allevatore" possono accedervi -->
  <script src="/auth-control.js"></script> 
  <script>
    protectRoute(['allevatore']);
  </script>
  <!-- Fine controllo accesso -->
  <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Struttura simile a add-azienda.html, con form per inserire i dati dell'animale -->
    <main class="dashboard-container">
        <header class="dashboard-header">
            <div class="nav-buttons">
                <a href="/home-allevatore.html" class="nav-home-btn">← Home</a>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-toggle">La tua azienda ▾</button>
                    <ul class="nav-dropdown-menu">
                        <li><a href="/add-azienda.html">Aggiungi azienda</a></li>
                        <li><a href="/view-azienda.html">Elimina azienda</a></li>
                    </ul>
                </div>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-toggle">La tua mandria ▾</button>
                    <ul class="nav-dropdown-menu">
                        <li><a href="/add-animale.html">Aggiungi animale</a></li>
                        <li><a href="/view-animali.html">Visualizza animali</a></li>
                    </ul>
                </div>
            </div>
            <h1 class="dashboard-title-light dashboard-title-centered">Aggiungi Animale 🐄</h1>
            <div class="header-right-actions">
                <div class="nav-dropdown" id="aziendaSwitcherDropdown">
                  <button id="currentAziendaBadge" class="dashboard-header-pill dashboard-header-pill-button" type="button">Azienda attiva: non selezionata ▾</button>
                  <ul class="nav-dropdown-menu azienda-switcher-menu" id="aziendaSwitcherMenu"></ul>
                </div>
                <button id="logoutButton">Logout</button>
            </div>
            
        </header>
        <section id="section-animale" class="section">
            <form id="add-animale-form" class="form">
                <label for="matricola">Matricola:</label>
                <input type="text" id="matricola" name="matricola" placeholder="Inserisci la matricola" required>

                <label for="nomeAnimale">Nome Animale:</label>
                <input type="text" id="nomeAnimale" name="nomeAnimale" placeholder="Inserisci il nome dell'animale" required>

                <label for="species">Specie:</label>
                <select id="species" name="species" required>
                    <option value="">Seleziona...</option>
                    <option value="mucca">Mucca</option>
                    <option value="pecora">Pecora</option>
                    <option value="capra">Capra</option>
                    <option value="pollo">Pollo</option>
                    <option value="coniglio">Coniglio</option>
                </select>

                <label for="dataNascita">Data di Nascita o di acquisto:</label>
                <input type="date" id="dataNascita" name="dataNascita" required>

                <label for="sesso">Sesso:</label>
                <select id="sesso" name="sesso" required>
                    <option value="">Seleziona...</option>
                    <option value="maschio">Maschio</option>
                    <option value="femmina">Femmina</option>
                </select>

                <label for="razza">Razza:</label>
                <input type="text" id="razza" name="razza" placeholder="Inserisci la razza dell'animale" required>

                <label for="figlioDi">Figlia di (ID genitore):</label>
                <input type="text" id="figliaDi" name="figliaDi" placeholder="Inserisci l'ID della madre (se conosciuto)">
                
                

                 <label for="note">Note:</label>
                <textarea id="note" name="note" placeholder="Inserisci eventuali note"></textarea>
                <button type="submit">Salva Animale</button>
            </form>
            <p id="addAnimaleMessage" class="status"></p>
            
        </section>
    </main>

    <script src="/azienda-switcher.js"></script>
    <script src="/add-animale.js"></script>
    <script src="/logout.js"></script>
</body>
</html>
