<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title >Aggiungi Azienda - MuccApp</title>
  <!-- Controllo accesso alla pagina, solo gli utenti con ruolo "allevatore" possono accedervi -->
  <script src="/auth-control.js"></script> 
  <script>
    protectRoute(['allevatore']);
  </script>
  <!-- Fine controllo accesso -->
  <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Struttura simile a add-animale.html, con form per inserire i dati dell'azienda agricola -->
    <main class="dashboard-container">
        <header class="dashboard-header">
            <div class="nav-buttons">
                <a href="/home-allevatore.html" class="nav-home-btn">← Home</a>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-toggle">La tua azienda ▾</button>
                    <ul class="nav-dropdown-menu">
                        <li><a href="/add-azienda.html">Aggiungi azienda</a></li>
                        <li><a href="/view-azienda.html">Elimina azienda</a></li>
                    </ul>
                </div>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-toggle">La tua mandria ▾</button>
                    <ul class="nav-dropdown-menu">
                        <li><a href="/add-animale.html">Aggiungi animale</a></li>
                        <li><a href="/view-animali.html">Visualizza animali</a></li>
                    </ul>
                </div>
            </div>
            <h1 class="dashboard-title-light">Aggiungi Azienda 🚜</h1>
        </header>
        <section id="section-azienda" class="section">
            <form id="add-azienda-form" class="form">
                <label for="nomeAzienda">Nome Azienda:</label>
                <input type="text" id="nomeAzienda" name="nomeAzienda" placeholder="Inserisci il nome dell'azienda" required>

                <label for="indirizzo">Indirizzo:</label>
                <input type="text" id="indirizzo" name="indirizzo" placeholder="Inserisci l'indirizzo dell'azienda" required>

                <label for="partitaIva">Partita IVA:</label>
                <input type="text" id="partitaIva" name="partitaIva" placeholder="Inserisci la partita IVA dell'azienda" required>

                <label for="telefono">Telefono:</label>
                <input type="text" id="telefono" name="telefono" placeholder="Inserisci il numero di telefono dell'azienda" >
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Inserisci l'email dell'azienda" >

                <label for="website">Sito Web:</label>
                <input type="url" id="website" name="website" placeholder="Inserisci il sito web dell'azienda" >

                
                <button type="submit">Salva Azienda</button>
            </form>
            <p id="addAziendaMessage" class="status"></p>
        </section>
    </main>

    <script src="/add-azienda.js"></script>
</body>
</html>
